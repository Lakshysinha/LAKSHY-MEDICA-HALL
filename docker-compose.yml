version: '3.9'
services:
  app:
    build: .
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    command: gunicorn --bind 0.0.0.0:8000 --workers 3 wsgi:app

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/certs:/etc/nginx/certs:ro
